<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDV — Início</title>
        <link rel="stylesheet" href="../styles/styles.css?v=4" />
    </head>
    <body>
        <header class="topbar">
            <div class="topbar-marca">
                <span class="logo-icon"></span>
                <strong>PDV Bilheteria</strong>
            </div>
            <nav class="topbar-nav">
                <a href="home.html" class="ativo">Início</a>
                <a href="venda.html">Nova Venda</a>
                <a href="relatorio.html">Relatório</a>
            </nav>
            <div class="topbar-user">
                <button id="btn-tema" class="btn btn-link btn-tema" type="button" aria-label="Alternar tema" title="Alternar tema">◐</button>
                <span id="lbl-usuario">--</span>
                <button id="btn-sair" class="btn btn-link">Sair</button>
            </div>
        </header>

        <main class="container">
            <section class="painel hub-painel">
                <div class="hub-cabecalho">
                    <h1>Olá, <span id="hub-nome">Atendente</span></h1>
                    <p class="painel-subtitulo">O que você deseja fazer agora?</p>
                </div>

                <div class="hub-cards">
                    <a href="venda.html" class="hub-card">
                        <span class="hub-card-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M3 9.5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4z" />
                                <path d="M15 7.5v9" stroke-dasharray="2 2.5" />
                            </svg>
                        </span>
                        <span class="hub-card-titulo">Iniciar nova venda</span>
                        <span class="hub-card-desc">Cadastre o cliente e emita o ingresso do evento.</span>
                    </a>

                    <a href="relatorio.html" class="hub-card">
                        <span class="hub-card-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                                <rect x="7" y="12" width="3" height="5" rx="0.5" />
                                <rect x="12" y="8" width="3" height="9" rx="0.5" />
                                <rect x="17" y="5" width="3" height="12" rx="0.5" />
                            </svg>
                        </span>
                        <span class="hub-card-titulo">Relatórios</span>
                        <span class="hub-card-desc">Consulte as vendas realizadas na bilheteria.</span>
                    </a>
                </div>
            </section>
        </main>

        <script src="../scripts/api.js"></script>
        <script src="../scripts/auth.js"></script>
        <script src="../scripts/home.js"></script>
    </body>
</html>
